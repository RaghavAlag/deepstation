<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owner Dashboard | ParkShare</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/dashboard.css" />
</head>
<body class="page page-owner">
  <div id="serverBanner" class="banner-server" style="display:none;">⚠️ Could not connect to server. Please check your connection or try refreshing.</div>
  <header class="navbar">
    <div class="nav-brand">ParkShare</div>
    <div class="profile">
      <button id="notifBellBtn" class="btn-secondary" title="Notifications" style="position:relative;">🔔 <span id="notifBadge" class="badge" style="display:none;background:#ff4444;">0</span></button>
      <span id="ownerName"></span>
      <img id="ownerAvatar" alt="Owner avatar" />
      <button id="signOutBtn" class="btn-danger">Sign Out</button>
    </div>
  </header>
  <section id="notifDropdown" class="owner-notif-flyout" style="display:none;" aria-live="polite"></section>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon" aria-hidden="true">◆</div>
        <div>
          <div class="sidebar-brand-title">ParkShare</div>
          <div class="sidebar-brand-sub muted">Owner console</div>
        </div>
      </div>
      <div class="sidebar-label">Workspace</div>
      <button class="btn-secondary tab-btn" data-tab="active">Live parking</button>
      <button class="btn-secondary tab-btn" data-tab="upcoming">Pre-booked</button>
      <button class="btn-secondary tab-btn" data-tab="history">History & claims</button>
      <button class="btn-secondary tab-btn" data-tab="spots">My spots</button>
      <div class="sidebar-spacer" aria-hidden="true"></div>
      <button class="btn-primary tab-btn tab-btn-cta" data-tab="list">＋ New listing</button>
    </aside>
    <main class="content">
      <div class="owner-shell">
        <section id="tab-active" class="panel active"></section>
        <section id="tab-upcoming" class="panel"></section>
        <section id="tab-history" class="panel"></section>
        <section id="tab-spots" class="panel"></section>
        <section id="tab-list" class="panel"></section>
      </div>
    </main>
  </div>
  <nav class="mobile-tabs">
    <button class="btn-secondary tab-btn" data-tab="active">Live</button>
    <button class="btn-secondary tab-btn" data-tab="upcoming">Queue</button>
    <button class="btn-secondary tab-btn" data-tab="history">Past</button>
    <button class="btn-secondary tab-btn" data-tab="spots">Spots</button>
    <button class="btn-primary tab-btn tab-btn-cta" data-tab="list">＋</button>
  </nav>
  <div class="toast-mini-wrap" id="toastWrap"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script type="module">
    const uid = sessionStorage.getItem('uid');
    const role = sessionStorage.getItem('role');
    if (!uid || role !== 'owner') {
      window.location.replace('./login.html');
    }

    const apiBase = 'http://localhost:3001/api';
    const firebaseConfig = {
      apiKey: "AIzaSyCz-vuMJ30m_Zuk_Rcyxp6Q3DF0olJfkAo",
      authDomain: "deepstation-b4c26.firebaseapp.com",
      projectId: "deepstation-b4c26",
      storageBucket: "deepstation-b4c26.appspot.com",
      messagingSenderId: "997619029787",
      appId: "1:997619029787:web:6e6ce7235be6179b5125be"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const firestore = firebase.firestore();
    const auth = firebase.auth();
    const ownerName = sessionStorage.getItem('name') || 'Owner';
    const ownerPhoto = sessionStorage.getItem('photoURL') || 'https://via.placeholder.com/40';
    const state = { currentTab: 'active', activeBookings: [], editingSpotId: null, uploadedImages: [], notifications: [], seenNotifIds: new Set() };

    document.getElementById('ownerName').textContent = ownerName;
    document.getElementById('ownerAvatar').src = ownerPhoto;
    document.getElementById('signOutBtn').addEventListener('click', () => {
      sessionStorage.clear();
      window.location.href = './login.html';
    });
    document.getElementById('notifBellBtn').addEventListener('click', (event) => {
      event.stopPropagation();
      const panel = document.getElementById('notifDropdown');
      const open = panel.style.display === 'flex';
      panel.style.display = open ? 'none' : 'flex';
      if (!open) renderNotifDropdown();
    });
    document.addEventListener('click', (event) => {
      const panel = document.getElementById('notifDropdown');
      const bell = document.getElementById('notifBellBtn');
      if (!panel.contains(event.target) && !bell.contains(event.target)) {
        panel.style.display = 'none';
      }
    });

    function showToast(message, type = 'info') {
      const variant = ['success', 'warning', 'danger', 'info'].includes(type) ? type : 'info';
      const wrap = document.getElementById('toastWrap');
      const el = document.createElement('div');
      el.className = `toast-mini toast-mini--${variant}`;
      el.textContent = message;
      wrap.appendChild(el);
      setTimeout(() => {
        el.remove();
      }, 4200);
    }

    function showServerBanner() {
      document.getElementById('serverBanner').style.display = 'block';
    }
    function hideServerBanner() {
      document.getElementById('serverBanner').style.display = 'none';
    }

    async function fetchJSON(url, options = {}) {
      try {
        const res = await fetch(url, options);
        hideServerBanner();
        if (!res.ok) {
          let detail = 'Request failed';
          try {
            const data = await res.json();
            detail = data.error || JSON.stringify(data);
          } catch {
            detail = await res.text();
          }
          throw new Error(detail || 'Request failed');
        }
        return res.json();
      } catch (error) {
        showServerBanner();
        throw error;
      }
    }

    async function verifySessionOnLoad() {
      try {
        const currentUser = auth.currentUser;
        if (currentUser) {
          const freshToken = await currentUser.getIdToken(true);
          await fetch(`${apiBase}/auth/verify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ idToken: freshToken })
          });
        }
      } catch (error) {
        sessionStorage.clear();
        window.location.replace('./login.html?reason=session_expired');
      }
    }

    function relativeTime(input) {
      const ms = Date.now() - new Date(input || Date.now()).getTime();
      const mins = Math.floor(ms / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins} minute${mins === 1 ? '' : 's'} ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs} hour${hrs === 1 ? '' : 's'} ago`;
      const days = Math.floor(hrs / 24);
      return `${days} day${days === 1 ? '' : 's'} ago`;
    }

    function updateNotifBadge() {
      const unread = state.notifications.filter((n) => !n.read).length;
      const badge = document.getElementById('notifBadge');
      if (unread > 0) {
        badge.style.display = 'inline-flex';
        badge.textContent = unread > 99 ? '99+' : String(unread);
      } else {
        badge.style.display = 'none';
      }
    }

    async function markNotifRead(notifId) {
      await fetch(`${apiBase}/notifications/${uid}/${notifId}`, { method: 'PATCH' });
    }

    async function markAllRead() {
      const unread = state.notifications.filter((n) => !n.read);
      await Promise.all(unread.map((n) => markNotifRead(n.id)));
    }

    function renderNotifDropdown() {
      const panel = document.getElementById('notifDropdown');
      const list = state.notifications.slice(0, 20);
      if (!list.length) {
        panel.innerHTML = '<div class="owner-notif-empty">All caught up</div>';
        return;
      }
      panel.innerHTML = `
        <div class="owner-notif-head">
          <span class="owner-notif-title">Alerts</span>
          <button type="button" id="markAllReadBtn" class="btn-secondary owner-notif-readall">Read all</button>
        </div>
        <div class="owner-notif-list">
        ${list.map((n) => `
          <button type="button" class="owner-notif-item ${n.read ? '' : 'owner-notif-item--new'}" data-id="${n.id}">
            <span class="owner-notif-msg">${n.message || ''}</span>
            <span class="owner-notif-time">${relativeTime(n.createdAt?.toDate ? n.createdAt.toDate() : n.createdAt)}</span>
          </button>
        `).join('')}
        </div>
      `;
      const markAllBtn = document.getElementById('markAllReadBtn');
      if (markAllBtn) {
        markAllBtn.onclick = async () => {
          await markAllRead();
          state.notifications = state.notifications.map((n) => ({ ...n, read: true }));
          updateNotifBadge();
          renderNotifDropdown();
        };
      }
      panel.querySelectorAll('.owner-notif-item').forEach((row) => {
        row.addEventListener('click', async () => {
          const id = row.dataset.id;
          await markNotifRead(id);
          state.notifications = state.notifications.map((n) => (n.id === id ? { ...n, read: true } : n));
          updateNotifBadge();
          renderNotifDropdown();
        });
      });
    }

    let notificationsInitialSnapshot = true;
    function setupNotificationListener() {
      firestore
        .collection('notifications')
        .doc(uid)
        .collection('items')
        .orderBy('createdAt', 'desc')
        .onSnapshot((snapshot) => {
          state.notifications = snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
          updateNotifBadge();
          renderNotifDropdown();
          snapshot.docChanges().forEach((change) => {
            if (change.type !== 'added') return;
            if (notificationsInitialSnapshot) return;
            const data = change.doc.data();
            if (state.seenNotifIds.has(change.doc.id)) return;
            state.seenNotifIds.add(change.doc.id);
            if (data.type === 'overstaying') showToast(`${data.message}`, 'warning');
            if (data.type === 'tow_alert') showToast(`${data.message}`, 'danger');
            if (data.type === 'booking_confirmed') showToast(data.message, 'success');
            if (data.type === 'extension_approved') showToast(data.message, 'success');
            if (data.type === 'damage_claim') showToast(data.message, 'warning');
          });
          notificationsInitialSnapshot = false;
        });
    }

    function setTab(tab) {
      state.currentTab = tab;
      document.querySelectorAll('.panel').forEach((p) => p.classList.remove('active'));
      document.getElementById(`tab-${tab}`).classList.add('active');
      document.querySelectorAll('.tab-btn').forEach((b) => {
        b.classList.toggle('is-active-tab', b.dataset.tab === tab);
      });
      loadTab(tab);
    }
    document.querySelectorAll('.tab-btn').forEach((b) => b.addEventListener('click', () => setTab(b.dataset.tab)));

    function countdownText(endTime) {
      const diff = new Date(endTime).getTime() - Date.now();
      if (diff <= 0) return 'Expired';
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      return `${h}h ${m}m ${s}s`;
    }

    function severityClass(sev) {
      if (sev === 'severe') return 'badge-danger';
      if (sev === 'moderate') return 'pill-danger';
      if (sev === 'minor') return 'badge-warning';
      return 'badge-success';
    }

    function historyStatusPillClass(status) {
      if (status === 'completed') return 'owner-status-pill--ok';
      if (status === 'cancelled') return 'owner-status-pill--bad';
      return 'owner-status-pill--neutral';
    }

    function renderActive(list) {
      const root = document.getElementById('tab-active');
      if (!list.length) return (root.innerHTML = '<div class="card muted">🅿️ No active bookings right now. Your spot is available!</div>');
      root.innerHTML = list.map((b) => `
        <article class="card booking-card owner-booking-card">
          <div class="owner-booking-head">
            <div><strong>${b.driverName || 'Driver'}</strong><span class="owner-booking-dot">·</span><span class="owner-booking-spot">${b.spotTitle || 'Spot'}</span></div>
            ${b.status === 'overstaying' ? '<span class="badge pill-danger">Overstay</span>' : ''}
          </div>
          <div class="owner-booking-timer muted" data-countdown="${b.bookingId}" data-end="${b.endTime}"></div>
          <div class="owner-booking-amount">₹${b.totalAmount || 0}</div>
          <div class="owner-card-actions">
            <button type="button" class="btn-danger owner-btn-block block-btn" data-spot="${b.spotId}" data-driver="${b.driverId}">Block driver</button>
          </div>
        </article>`).join('');
      root.querySelectorAll('.block-btn').forEach((btn) => btn.addEventListener('click', async () => {
        try {
          await fetchJSON(`${apiBase}/spots/${btn.dataset.spot}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ blockDriverUid: btn.dataset.driver })
          });
          showToast('Driver blocked for this spot.');
        } catch {
          showToast('Could not block driver.');
        }
      }));
      updateCountdowns();
    }

    function renderPreBooked(list) {
      const root = document.getElementById('tab-upcoming');
      if (!list.length) return (root.innerHTML = '<div class="card muted">📅 No upcoming bookings yet.</div>');
      root.innerHTML = list.sort((a,b)=>new Date(a.startTime)-new Date(b.startTime)).map((b) => `
        <article class="card booking-card owner-booking-card">
          <div class="owner-booking-head"><strong>${b.driverName || 'Driver'}</strong><span class="owner-booking-dot">·</span><span class="owner-booking-spot">${b.spotTitle || 'Spot'}</span></div>
          <div class="muted owner-booking-window">${new Date(b.startTime).toLocaleString()} → ${new Date(b.endTime).toLocaleString()}</div>
          <div class="owner-booking-amount">₹${b.totalAmount || 0}</div>
        </article>`).join('');
    }

    function damageMarkup(b) {
      const r = b.damageReport || {};
      const areas = Array.isArray(r.suspectedDamageAreas) ? r.suspectedDamageAreas : [];
      const conf = Number(r.confidenceScore || 0);
      const entryVideo = b.entryVideoURL
        ? `<a href="${b.entryVideoURL}" target="_blank" rel="noopener">Open entry video</a>`
        : '<span class="muted">Entry video not uploaded.</span>';
      const exitVideo = b.exitVideoURL
        ? `<a href="${b.exitVideoURL}" target="_blank" rel="noopener">Open exit video</a>`
        : '<span class="muted">Exit video not uploaded.</span>';
      return `
        <div class="damage-section">
          <div class="chips">${areas.map((a) => `<span class="chip">${a}</span>`).join('')}</div>
          <span class="badge ${severityClass(r.severity)}">${r.severity || 'none'}</span>
          <div class="progress" style="margin:8px 0;"><span style="width:${conf}%;"></span></div>
          <div>Estimated repair: ₹${r.estimatedRepairCost || 0}</div>
          <div><span class="badge">${r.recommendation || 'Investigate'}</span></div>
          <div style="margin-top:8px;">📹 ${entryVideo}</div>
          <div>📹 ${exitVideo}</div>
          <p class="muted">${r.aiRemarks || 'No remarks available.'}</p>
          <div class="owner-claim-actions">
            <button type="button" class="btn-primary claim-btn" data-id="${b.bookingId}" data-decision="accepted">Accept</button>
            <button type="button" class="btn-danger claim-btn" data-id="${b.bookingId}" data-decision="rejected">Reject</button>
          </div>
        </div>`;
    }

    function renderHistory(list) {
      const root = document.getElementById('tab-history');
      const completed = (list || []).filter((b) => b.status === 'completed');
      const completedEarned = completed.reduce((s, b) => s + Number(b.totalAmount || 0), 0);
      const now = new Date();
      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
      const monthEarned = completed
        .filter((b) => new Date(b.endTime || b.startTime).getTime() >= monthStart.getTime())
        .reduce((s, b) => s + Number(b.totalAmount || 0), 0);
      const fmt = (n) => (Number.isFinite(n) ? n.toLocaleString('en-IN') : '0');

      const earningsStrip = `
        <div class="owner-earnings-strip">
          <div class="owner-earn-card">
            <div class="owner-earn-label">Total earned</div>
            <div class="owner-earn-value">₹${fmt(completedEarned)}</div>
            <div class="owner-earn-sub">${completed.length} completed</div>
          </div>
          <div class="owner-earn-card">
            <div class="owner-earn-label">This month</div>
            <div class="owner-earn-value owner-earn-value--accent">₹${fmt(monthEarned)}</div>
          </div>
          <div class="owner-earn-card">
            <div class="owner-earn-label">In history</div>
            <div class="owner-earn-value owner-earn-value--dim">${list.length}</div>
            <div class="owner-earn-sub">trips</div>
          </div>
        </div>`;

      if (!list.length) {
        root.innerHTML = `${earningsStrip}<div class="card owner-empty-card muted">No booking history yet. List a spot to start earning.</div>`;
        return;
      }

      root.innerHTML = earningsStrip + list.map((b) => `
        <article class="card booking-card owner-history-card">
          <div class="owner-history-top">
            <div><strong>${b.driverName || 'Driver'}</strong><span class="owner-booking-dot">·</span><span class="owner-booking-spot">${b.spotTitle || 'Spot'}</span></div>
            <span class="owner-status-pill ${historyStatusPillClass(b.status)}">${b.status || ''}</span>
          </div>
          <div class="muted owner-history-meta">${new Date(b.endTime || Date.now()).toLocaleDateString()} · ${b.durationHours || 0}h</div>
          <div class="owner-history-earn"><span class="owner-history-earn-label">You earned</span><span class="owner-history-earn-amt">₹${fmt(Number(b.totalAmount || 0))}</span></div>
          ${b.damageClaimStatus === 'pending' ? `<button type="button" class="btn-secondary owner-dmg-toggle dmg-toggle" data-id="${b.bookingId}">Damage claim</button><div id="dmg-${b.bookingId}" class="hidden">${damageMarkup(b)}</div>` : ''}
        </article>`).join('');
      root.querySelectorAll('.dmg-toggle').forEach((btn) => btn.addEventListener('click', () => {
        document.getElementById(`dmg-${btn.dataset.id}`).classList.toggle('hidden');
      }));
      root.querySelectorAll('.claim-btn').forEach((btn) => btn.addEventListener('click', async () => {
        try {
          await fetchJSON(`${apiBase}/bookings/${btn.dataset.id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ damageClaimStatus: 'resolved', ownerDecision: btn.dataset.decision })
          });
          showToast(btn.dataset.decision === 'accepted' ? 'Claim accepted. Compensation arranged.' : 'Claim rejected.');
          loadHistory();
        } catch {
          showToast('Could not update damage claim.');
        }
      }));
    }

    function spotFormHTML() {
      return `
        <form id="spotForm" class="card table-form owner-spot-form">
          <div class="field"><label class="label">Title</label><input required name="title" placeholder="e.g. Covered slot near metro" /></div>
          <div class="field"><label class="label">Address</label><input required name="address" /></div>
          <div class="field"><label class="label">Description</label><textarea name="description" rows="3"></textarea></div>
          <div class="grid grid-2">
            <div class="field"><label class="label">Latitude</label><input required type="number" step="any" name="latitude" /></div>
            <div class="field"><label class="label">Longitude</label><input required type="number" step="any" name="longitude" /></div>
          </div>
          <div class="field">
            <label class="label">Vehicle types</label>
            <div class="owner-pill-row" role="group" aria-label="Vehicle types">
              <label class="owner-chip-check"><input type="checkbox" name="vehicleTypes" value="Car" /><span>Car</span></label>
              <label class="owner-chip-check"><input type="checkbox" name="vehicleTypes" value="Bike" /><span>Bike</span></label>
              <label class="owner-chip-check"><input type="checkbox" name="vehicleTypes" value="Truck" /><span>Truck</span></label>
            </div>
          </div>
          <div class="field">
            <label class="label">Amenities</label>
            <div class="owner-pill-row owner-pill-row--wrap">
              <label class="owner-chip-check"><input type="checkbox" name="isCovered" /><span>Covered</span></label>
              <label class="owner-chip-check"><input type="checkbox" name="hasEVCharging" /><span>EV charge</span></label>
              <label class="owner-chip-check"><input type="checkbox" name="hasCCTV" /><span>CCTV</span></label>
            </div>
          </div>
          <div class="grid grid-2">
            <div class="field"><label class="label">Hourly (₹)</label><input required type="number" name="baseHourlyRate" min="0" /></div>
            <div class="field"><label class="label">Daily (₹)</label><input required type="number" name="baseDailyRate" min="0" /></div>
          </div>
          <div class="owner-time-grid grid grid-2">
            <div class="field">
              <label class="label">Opens</label>
              <div class="owner-time-shell">
                <input required type="time" name="availableFrom" class="owner-time-input" />
              </div>
            </div>
            <div class="field">
              <label class="label">Closes</label>
              <div class="owner-time-shell">
                <input required type="time" name="availableTo" class="owner-time-input" />
              </div>
            </div>
          </div>
          <div class="field"><label class="label">Photos (max 5)</label><input id="spotImages" type="file" accept="image/*" multiple /></div>
          <div id="uploadProgress"></div>
          <div class="owner-form-actions">
            <button class="btn-primary owner-form-submit" type="submit">${state.editingSpotId ? 'Save spot' : 'Publish listing'}</button>
          </div>
        </form>`;
    }

    async function uploadImages(files, spotId) {
      const bar = document.getElementById('uploadProgress');
      bar.innerHTML = '';
      const limitedFiles = files.slice(0, 5);
      limitedFiles.forEach((file) => {
        const row = document.createElement('div');
        row.className = 'progress-item';
        row.innerHTML = `<div class="muted">${file.name}</div><div class="progress"><span style="width:20%"></span></div>`;
        bar.appendChild(row);
      });
      const formData = new FormData();
      formData.append('spotId', spotId);
      limitedFiles.forEach((file) => formData.append('images', file));

      const response = await fetch(`${apiBase}/spots/upload`, {
        method: 'POST',
        body: formData
      });

      if (!response.ok) {
        let detail = 'Local image upload failed';
        try {
          const data = await response.json();
          detail = data.error || detail;
        } catch {
          // ignore parsing errors
        }
        throw new Error(detail);
      }

      const payload = await response.json();
      bar.querySelectorAll('.progress span').forEach((el) => {
        el.style.width = '100%';
      });
      return payload.imageUrls || [];
    }

    function renderSpots(list) {
      const root = document.getElementById('tab-spots');
      if (!list.length) {
        root.innerHTML = '<div class="card muted">📍 You haven\'t listed any spots yet.</div><button id="listFirstSpotBtn" class="btn-primary" style="margin-top:8px;">List Your First Spot →</button>';
        document.getElementById('listFirstSpotBtn').onclick = () => setTab('list');
        return;
      }
      root.innerHTML = list.map((s) => `
        <article class="card spot-card owner-spot-card">
          <div class="owner-spot-head">
            <div>
              <div><strong>${s.title}</strong></div>
              <div class="muted owner-spot-addr">${s.address}</div>
            </div>
            <span class="owner-spot-live ${s.isActive ? 'owner-spot-live--on' : ''}">${s.isActive ? 'Live' : 'Off'}</span>
          </div>
          <div class="owner-spot-rate">₹${s.baseHourlyRate || 0}<span class="owner-spot-rate-unit">/hr</span></div>
          <div class="owner-spot-toolbar">
            <button type="button" class="toggle-switch ${s.isActive ? 'active' : ''}" data-toggle="${s.spotId}" title="Toggle listing"></button>
            <div class="owner-spot-btns">
              <button type="button" class="btn-secondary edit-spot" data-id="${s.spotId}">Edit</button>
              <button type="button" class="btn-danger del-spot owner-btn-ghost-danger" data-id="${s.spotId}">Remove</button>
            </div>
          </div>
        </article>`).join('');
      root.querySelectorAll('[data-toggle]').forEach((t) => t.addEventListener('click', async () => {
        const id = t.dataset.toggle;
        const src = list.find((x) => x.spotId === id);
        await fetchJSON(`${apiBase}/spots/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ isActive: !src.isActive }) });
        showToast('Spot status updated.');
        loadSpots();
      }));
      root.querySelectorAll('.del-spot').forEach((b) => b.addEventListener('click', async () => {
        if (!confirm('Delete this spot?')) return;
        await fetchJSON(`${apiBase}/spots/${b.dataset.id}`, { method: 'DELETE' });
        showToast('Spot deleted.');
        loadSpots();
      }));
      root.querySelectorAll('.edit-spot').forEach((b) => b.addEventListener('click', () => {
        const spot = list.find((x) => x.spotId === b.dataset.id);
        state.editingSpotId = spot.spotId;
        setTab('list');
        setTimeout(() => fillSpotForm(spot), 50);
      }));
    }

    function fillSpotForm(spot) {
      const form = document.getElementById('spotForm');
      if (!form) return;
      Object.entries({
        title: spot.title, address: spot.address, description: spot.description,
        latitude: spot.latitude, longitude: spot.longitude,
        baseHourlyRate: spot.baseHourlyRate, baseDailyRate: spot.baseDailyRate,
        availableFrom: spot.availableFrom, availableTo: spot.availableTo
      }).forEach(([k, v]) => { if (form.elements[k]) form.elements[k].value = v ?? ''; });
      ['Car', 'Bike', 'Truck'].forEach((t) => {
        const checkbox = form.querySelector(`input[name="vehicleTypes"][value="${t}"]`);
        checkbox.checked = (spot.vehicleTypes || []).includes(t);
      });
      form.elements.isCovered.checked = !!spot.isCovered;
      form.elements.hasEVCharging.checked = !!spot.hasEVCharging;
      form.elements.hasCCTV.checked = !!spot.hasCCTV;
    }

    function renderListForm() {
      const root = document.getElementById('tab-list');
      root.innerHTML = spotFormHTML();
      const form = document.getElementById('spotForm');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = form.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = state.editingSpotId ? 'Saving…' : 'Publishing…';
        try {
          const fd = new FormData(form);
          const files = Array.from(document.getElementById('spotImages').files || []);
          const localSpotId = state.editingSpotId || crypto.randomUUID();
          const uploaded = files.length ? await uploadImages(files, localSpotId) : [];
          const payload = {
            ownerId: uid,
            ownerName,
            title: fd.get('title'),
            address: fd.get('address'),
            description: fd.get('description'),
            latitude: Number(fd.get('latitude')),
            longitude: Number(fd.get('longitude')),
            vehicleTypes: fd.getAll('vehicleTypes'),
            isCovered: form.elements.isCovered.checked,
            hasEVCharging: form.elements.hasEVCharging.checked,
            hasCCTV: form.elements.hasCCTV.checked,
            baseHourlyRate: Number(fd.get('baseHourlyRate')),
            baseDailyRate: Number(fd.get('baseDailyRate')),
            availableFrom: fd.get('availableFrom'),
            availableTo: fd.get('availableTo'),
            images: uploaded,
            isActive: true
          };
          if (state.editingSpotId) {
            await fetchJSON(`${apiBase}/spots/${state.editingSpotId}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            showToast('Spot updated successfully! ✅');
          } else {
            await fetchJSON(`${apiBase}/spots`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            showToast('Spot listed successfully! ✅');
          }
          form.reset();
          document.getElementById('uploadProgress').innerHTML = '';
          state.editingSpotId = null;
          await loadSpots();
          setTab('spots');
        } catch (error) {
          const code = error?.code ? ` (${error.code})` : '';
          showToast(`Could not save spot${code}. ${error?.message || ''}`.trim());
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = state.editingSpotId ? 'Save spot' : 'Publish listing';
        }
      });
    }

    function updateCountdowns() {
      document.querySelectorAll('[data-countdown]').forEach((el) => {
        el.textContent = `Time remaining: ${countdownText(el.dataset.end)}`;
      });
    }
    setInterval(updateCountdowns, 1000);

    async function loadActive() {
      document.getElementById('tab-active').innerHTML = '<div class="card"><div class="skeleton" style="height:18px;margin-bottom:8px;"></div><div class="skeleton" style="height:14px;width:70%;"></div></div>';
      const data = await fetchJSON(`${apiBase}/bookings?ownerId=${uid}&status=active`).catch(() => ({ bookings: [] }));
      state.activeBookings = data.bookings || [];
      renderActive(state.activeBookings);
    }
    async function loadUpcoming() {
      document.getElementById('tab-upcoming').innerHTML = '<div class="card"><div class="skeleton" style="height:18px;margin-bottom:8px;"></div><div class="skeleton" style="height:14px;width:70%;"></div></div>';
      const data = await fetchJSON(`${apiBase}/bookings?ownerId=${uid}&status=upcoming`).catch(() => ({ bookings: [] }));
      renderPreBooked(data.bookings || []);
    }
    async function loadHistory() {
      document.getElementById('tab-history').innerHTML = '<div class="card"><div class="skeleton" style="height:18px;margin-bottom:8px;"></div><div class="skeleton" style="height:14px;width:70%;"></div></div>';
      const data = await fetchJSON(`${apiBase}/bookings?ownerId=${uid}&status=completed,cancelled`).catch(() => ({ bookings: [] }));
      renderHistory(data.bookings || []);
    }
    async function loadSpots() {
      document.getElementById('tab-spots').innerHTML = '<div class="card"><div class="skeleton" style="height:18px;margin-bottom:8px;"></div><div class="skeleton" style="height:14px;width:70%;"></div></div>';
      const data = await fetchJSON(`${apiBase}/spots?ownerId=${uid}`).catch(() => ({ spots: [] }));
      renderSpots(data.spots || []);
    }

    async function loadTab(tab) {
      if (tab === 'active') return loadActive();
      if (tab === 'upcoming') return loadUpcoming();
      if (tab === 'history') return loadHistory();
      if (tab === 'spots') return loadSpots();
      if (tab === 'list') return renderListForm();
    }

    setInterval(() => { if (state.currentTab === 'active') loadActive(); }, 30000);
    setInterval(() => { if (state.currentTab === 'history') loadHistory(); }, 15000);
    verifySessionOnLoad();
    setupNotificationListener();
    setTab('active');
  </script>
</body>
</html>
