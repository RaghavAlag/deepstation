<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Driver Dashboard | ParkShare</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/dashboard.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body class="page page-driver">
  <header class="navbar">
    <div class="nav-brand">ParkShare</div>
    <div class="profile">
      <button id="historyBtn" class="btn-secondary">History</button>
      <button id="notifBellBtn" class="btn-secondary" title="Notifications" style="position:relative;">🔔 <span id="notifBadge" class="badge" style="background:#ff4444;display:none;">0</span></button>
      <span id="driverName"></span>
      <img id="driverPhoto" alt="Driver photo" />
      <button id="signOutBtn" class="btn-danger">Sign Out</button>
    </div>
  </header>
  <section id="notifDropdown" class="card notif-flyout" style="display:none;"></section>

  <div id="map"></div>
  <div id="serverBanner" class="banner-server" style="display:none;">⚠️ Could not connect to server. Please check your connection or try refreshing.</div>
  <div id="mapLoadingOverlay" class="map-load-wrap" aria-hidden="true"><div class="map-load-spin"></div></div>
  <div class="floating-search">
    <div class="search-box"><span aria-hidden="true">🔍</span><input id="searchInput" type="text" inputmode="search" name="driver_location_search" placeholder="Search location..." enterkeyhint="search" autocomplete="off" autocorrect="off" spellcheck="false" /></div>
    <div id="suggestions" class="suggestions" style="display:none;"></div>
  </div>

  <div id="toastWrap" class="toast-mini-wrap"></div>
  <section id="sheet" class="bottom-sheet"></section>
  <section id="activeBookingBar" class="active-booking"></section>
  <section id="historyPanel" class="history-panel"></section>
  <section id="towBanner" class="tow-banner">🚨 TOW ALERT — Your vehicle has been flagged for removal. Return immediately.</section>

  <div id="bookingModalWrap" class="overlay">
    <div class="modal">
      <h3 style="margin-bottom:10px;">Confirm Booking</h3>
      <div id="bookingSummary" class="muted" style="margin-bottom:10px;"></div>
      <button id="confirmBookBtn" class="btn-primary" style="width:100%;">Confirm & Pay (Demo)</button>
      <p id="bookingError" style="color:var(--danger);margin-top:8px;"></p>
      <button id="closeModalBtn" class="btn-secondary" style="margin-top:8px;width:100%;">Cancel</button>
    </div>
  </div>
  <div id="extensionModalWrap" class="overlay">
    <div class="modal">
      <div id="extensionModalContent"></div>
      <button id="closeExtensionBtn" class="btn-secondary" style="margin-top:8px;width:100%;">Close</button>
    </div>
  </div>
  <div id="videoModalWrap" class="overlay">
    <div class="modal">
      <h3 id="videoModalTitle">Record Video</h3>
      <p id="videoModalSubtext" class="muted" style="margin:6px 0 10px;"></p>
      <video id="capturePreview" autoplay muted playsinline style="width:100%;border:1px solid var(--border);border-radius:12px;background:#000;"></video>
      <div id="recBadge" style="display:none;color:#ff4444;font-weight:700;margin-top:8px;">● REC</div>
      <div class="progress" style="margin-top:8px;"><span id="videoUploadFill" style="width:0%;"></span></div>
      <button id="videoPrimaryBtn" class="btn-primary" style="width:100%;margin-top:8px;">Start Camera</button>
      <button id="videoSkipBtn" class="btn-secondary" style="width:100%;margin-top:8px;">Skip (Demo)</button>
      <p id="videoStatusText" class="muted" style="margin-top:8px;"></p>
    </div>
  </div>
  <div id="damagePromptWrap" class="overlay">
    <div class="modal">
      <h3>Did you notice any new damage to your vehicle?</h3>
      <button id="damageYesBtn" class="btn-danger" style="width:100%;margin-top:10px;">Yes, I noticed damage 🔴</button>
      <button id="damageNoBtn" class="btn-primary" style="width:100%;margin-top:8px;">No damage, all good ✅</button>
    </div>
  </div>
  <div id="damageClaimWrap" class="overlay">
    <div class="modal">
      <div id="damageClaimContent"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script>
    const uid = sessionStorage.getItem('uid');
    const role = sessionStorage.getItem('role');
    if (!uid || role !== 'driver') window.location.replace('./login.html');

    const apiBase = 'http://localhost:3001/api';
    const firebaseConfig = {
      apiKey: "AIzaSyCz-vuMJ30m_Zuk_Rcyxp6Q3DF0olJfkAo",
      authDomain: "deepstation-b4c26.firebaseapp.com",
      projectId: "deepstation-b4c26",
      storageBucket: "deepstation-b4c26.appspot.com",
      messagingSenderId: "997619029787",
      appId: "1:997619029787:web:6e6ce7235be6179b5125be"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const firestore = firebase.firestore();
    const auth = firebase.auth();
    const state = {
      map: null,
      userPos: { lat: 18.9667, lng: 72.8333 },
      markers: [],
      spots: [],
      selectedSpot: null,
      selectedHours: 1,
      selectedStartTime: null,
      selectedRate: 0,
      currentBooking: null,
      spotMarkerStatus: {},
      entryVideoURL: null,
      exitVideoURL: null,
      lastBookingId: null,
      awaitingDamagePrompt: false,
      notifications: [],
      seenNotifIds: new Set()
    };
    let captureStream = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let captureMode = 'entry';

    document.getElementById('driverName').textContent = sessionStorage.getItem('name') || 'Driver';
    document.getElementById('driverPhoto').src = sessionStorage.getItem('photoURL') || 'https://via.placeholder.com/40';
    document.getElementById('signOutBtn').onclick = () => { sessionStorage.clear(); window.location.href = './login.html'; };
    document.getElementById('closeExtensionBtn').onclick = () => document.getElementById('extensionModalWrap').classList.remove('show');
    document.getElementById('notifBellBtn').onclick = (e) => {
      e.stopPropagation();
      const hist = document.getElementById('historyPanel');
      if (hist.classList.contains('open')) {
        hist.classList.remove('open');
        hist.innerHTML = '';
      }
      const panel = document.getElementById('notifDropdown');
      panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
      if (panel.style.display === 'block') renderNotifDropdown();
    };
    document.addEventListener('click', (e) => {
      const panel = document.getElementById('notifDropdown');
      const bell = document.getElementById('notifBellBtn');
      if (!panel.contains(e.target) && !bell.contains(e.target)) {
        panel.style.display = 'none';
      }
      const hist = document.getElementById('historyPanel');
      const histBtn = document.getElementById('historyBtn');
      if (hist.classList.contains('open') && !hist.contains(e.target) && !histBtn.contains(e.target)) {
        hist.classList.remove('open');
        hist.innerHTML = '';
      }
    });

    const haversineDistance = (lat1, lng1, lat2, lng2) => {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2) * Math.sin(dLng/2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    };

    function showServerBanner() {
      document.getElementById('serverBanner').style.display = 'block';
    }
    function hideServerBanner() {
      document.getElementById('serverBanner').style.display = 'none';
    }

    const json = async (url, options = {}) => {
      try {
        const res = await fetch(url, options);
        hideServerBanner();
        if (!res.ok) throw new Error((await res.text()) || 'Request failed');
        return res.json();
      } catch (error) {
        showServerBanner();
        throw error;
      }
    };

    async function verifySessionOnLoad() {
      try {
        const currentUser = auth.currentUser;
        if (currentUser) {
          const freshToken = await currentUser.getIdToken(true);
          await fetch(`${apiBase}/auth/verify`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ idToken: freshToken })
          });
        }
      } catch (error) {
        sessionStorage.clear();
        window.location.replace('./login.html?reason=session_expired');
      }
    }

    function relativeTime(input) {
      const ms = Date.now() - new Date(input || Date.now()).getTime();
      const mins = Math.floor(ms / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins} minute${mins === 1 ? '' : 's'} ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs} hour${hrs === 1 ? '' : 's'} ago`;
      const days = Math.floor(hrs / 24);
      return `${days} day${days === 1 ? '' : 's'} ago`;
    }

    function showToast(message, type = 'info') {
      const variant = ['success', 'warning', 'danger', 'info'].includes(type) ? type : 'info';
      const wrap = document.getElementById('toastWrap');
      const toast = document.createElement('div');
      toast.className = `toast-mini toast-mini--${variant}`;
      toast.textContent = message;
      wrap.appendChild(toast);
      setTimeout(() => toast.remove(), 4200);
    }

    function updateNotifBadge() {
      const unread = state.notifications.filter((n) => !n.read).length;
      const badge = document.getElementById('notifBadge');
      if (unread > 0) {
        badge.style.display = 'inline-flex';
        badge.textContent = unread > 99 ? '99+' : String(unread);
      } else {
        badge.style.display = 'none';
      }
    }

    async function markNotifRead(notifId) {
      await fetch(`${apiBase}/notifications/${uid}/${notifId}`, { method: 'PATCH' });
    }

    async function markAllRead() {
      const unread = state.notifications.filter((n) => !n.read);
      await Promise.all(unread.map((n) => markNotifRead(n.id)));
    }

    function showTowBannerNotification(message) {
      const banner = document.getElementById('towBanner');
      const ownerName = state.currentBooking?.ownerName || state.selectedSpot?.ownerName || 'the spot owner';
      banner.innerHTML = `🚨 TOW ALERT — ${message} <button id="towCallOwnerBtn" class="btn-secondary" style="margin-left:10px;">Call Owner</button>`;
      banner.classList.add('show');
      const callBtn = document.getElementById('towCallOwnerBtn');
      if (callBtn) {
        callBtn.onclick = () => alert(`Owner: ${ownerName}\nPlease contact the spot owner immediately.`);
      }
    }

    const DRIVER_HIDDEN_HISTORY_KEY = 'parkshare_driver_hidden_bookings';

    function bookingKey(b) {
      return String(b.bookingId || b.id || '');
    }

    function getHiddenHistoryIds() {
      try {
        return new Set(JSON.parse(localStorage.getItem(DRIVER_HIDDEN_HISTORY_KEY) || '[]').filter(Boolean));
      } catch {
        return new Set();
      }
    }

    function saveHiddenHistoryIds(set) {
      localStorage.setItem(DRIVER_HIDDEN_HISTORY_KEY, JSON.stringify([...set]));
    }

    function renderNotifDropdown() {
      const panel = document.getElementById('notifDropdown');
      const list = state.notifications.slice(0, 20);
      if (!list.length) {
        panel.innerHTML = '<div class="notif-empty">You\'re all caught up 🎉</div>';
        return;
      }
      panel.innerHTML = `
        <div class="notif-dropdown-head">
          <strong class="notif-dropdown-title">Notifications</strong>
          <button id="markAllReadBtn" class="btn-secondary notif-toolbar-btn">Mark all read</button>
        </div>
        ${list.map((n) => `
          <article class="card notif-row" data-id="${n.id}" style="${n.read ? '' : 'border-left:4px solid #00d4ff;background:rgba(0,212,255,0.12);'} margin-bottom:6px;cursor:pointer;">
            <div class="notif-msg">${n.message || ''}</div>
            <div class="notif-time">${relativeTime(n.createdAt?.toDate ? n.createdAt.toDate() : n.createdAt)}</div>
          </article>
        `).join('')}
      `;
      const markAllBtn = document.getElementById('markAllReadBtn');
      if (markAllBtn) {
        markAllBtn.onclick = async () => {
          await markAllRead();
          state.notifications = state.notifications.map((n) => ({ ...n, read: true }));
          updateNotifBadge();
          renderNotifDropdown();
        };
      }
      panel.querySelectorAll('.notif-row').forEach((row) => {
        row.onclick = async () => {
          const id = row.dataset.id;
          await markNotifRead(id);
          state.notifications = state.notifications.map((n) => (n.id === id ? { ...n, read: true } : n));
          updateNotifBadge();
          renderNotifDropdown();
        };
      });
    }

    let notificationsInitialSnapshot = true;
    function setupNotificationListener() {
      firestore
        .collection('notifications')
        .doc(uid)
        .collection('items')
        .orderBy('createdAt', 'desc')
        .onSnapshot((snapshot) => {
          state.notifications = snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
          updateNotifBadge();
          renderNotifDropdown();
          snapshot.docChanges().forEach((change) => {
            if (change.type !== 'added') return;
            if (notificationsInitialSnapshot) return;
            const data = change.doc.data();
            if (state.seenNotifIds.has(change.doc.id)) return;
            state.seenNotifIds.add(change.doc.id);
            if (data.type === 'overstaying') showToast(`${data.message}`, 'warning');
            if (data.type === 'tow_alert') {
              showToast(`${data.message}`, 'danger');
              showTowBannerNotification(data.message);
            }
            if (data.type === 'booking_confirmed') showToast(data.message, 'success');
            if (data.type === 'extension_approved') showToast(data.message, 'success');
            if (data.type === 'damage_claim') showToast(data.message, 'warning');
          });
          notificationsInitialSnapshot = false;
        });
    }

    function stopCaptureStream() {
      if (captureStream) {
        captureStream.getTracks().forEach((t) => t.stop());
        captureStream = null;
      }
    }

    async function uploadVideoBlob(blob, bookingId, mode) {
      const fill = document.getElementById('videoUploadFill');
      fill.style.width = '15%';
      const formData = new FormData();
      formData.append('bookingId', bookingId);
      formData.append('mode', mode);
      formData.append('video', blob, `${mode}.webm`);
      const response = await fetch(`${apiBase}/damage/upload-video`, {
        method: 'POST',
        body: formData
      });
      fill.style.width = '80%';
      if (!response.ok) {
        throw new Error('Video upload failed');
      }
      const payload = await response.json();
      fill.style.width = '100%';
      return payload.videoURL;
    }

    function openVideoModal(mode) {
      captureMode = mode;
      const wrap = document.getElementById('videoModalWrap');
      const title = document.getElementById('videoModalTitle');
      const sub = document.getElementById('videoModalSubtext');
      const primary = document.getElementById('videoPrimaryBtn');
      const skip = document.getElementById('videoSkipBtn');
      const status = document.getElementById('videoStatusText');
      const preview = document.getElementById('capturePreview');
      const recBadge = document.getElementById('recBadge');
      const fill = document.getElementById('videoUploadFill');
      fill.style.width = '0%';
      status.textContent = '';
      recBadge.style.display = 'none';
      title.textContent = mode === 'entry' ? 'Record Entry Walk-Around Video' : 'Record Exit Walk-Around Video';
      sub.textContent = mode === 'entry'
        ? 'Please record a short 360° walk-around of your vehicle before parking. This protects you in case of any damage claims.'
        : 'Please record a short 360° walk-around of your vehicle before leaving the parking spot.';
      primary.textContent = 'Start Camera';
      primary.disabled = false;
      wrap.classList.add('show');

      primary.onclick = async () => {
        try {
          if (!captureStream) {
            captureStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
            preview.srcObject = captureStream;
            primary.textContent = 'Start Recording';
            return;
          }
          if (!mediaRecorder || mediaRecorder.state === 'inactive') {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(captureStream);
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = async () => {
              try {
                status.textContent = 'Uploading video...';
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const bookingId = state.currentBooking?.bookingId || state.lastBookingId;
                const url = await uploadVideoBlob(blob, bookingId, mode);
                if (mode === 'entry') state.entryVideoURL = url;
                if (mode === 'exit') state.exitVideoURL = url;
                await json(`${apiBase}/bookings/${bookingId}`, {
                  method: 'PATCH',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(mode === 'entry' ? { entryVideoURL: url } : { exitVideoURL: url })
                });
                status.textContent = `${mode === 'entry' ? 'Entry' : 'Exit'} video saved ✅`;
                stopCaptureStream();
                wrap.classList.remove('show');
                if (mode === 'exit') openDamagePrompt();
              } catch (error) {
                status.textContent = 'Upload failed. You can use Skip (Demo).';
                if (mode === 'exit') {
                  stopCaptureStream();
                  wrap.classList.remove('show');
                  showToast('Exit video upload failed. Continuing to damage check.');
                  openDamagePrompt();
                }
              }
            };
            mediaRecorder.start();
            recBadge.style.display = 'block';
            primary.textContent = 'Stop & Upload';
            return;
          }
          if (mediaRecorder.state === 'recording') {
            recBadge.style.display = 'none';
            primary.disabled = true;
            mediaRecorder.stop();
          }
        } catch (error) {
          status.textContent = 'Camera not available on this device or browser. You can skip video recording for the demo.';
        }
      };

      skip.onclick = () => {
        stopCaptureStream();
        wrap.classList.remove('show');
        if (mode === 'entry') {
          showToast('Entry video skipped (Demo).');
        } else {
          openDamagePrompt();
        }
      };
    }

    function openDamagePrompt() {
      const wrap = document.getElementById('damagePromptWrap');
      if (wrap.classList.contains('show')) return;
      wrap.classList.add('show');
      document.getElementById('damageNoBtn').onclick = () => {
        wrap.classList.remove('show');
        state.awaitingDamagePrompt = false;
        showToast('Booking ended. Thanks for using ParkShare!');
      };
      document.getElementById('damageYesBtn').onclick = () => {
        wrap.classList.remove('show');
        openDamageClaimForm();
      };
    }

    function openDamageClaimForm() {
      const wrap = document.getElementById('damageClaimWrap');
      const content = document.getElementById('damageClaimContent');
      content.innerHTML = `
        <h2 style="font-family:var(--font-head);">Report Damage</h2>
        <textarea id="damageNote" placeholder="Describe what you noticed — e.g. scratch on rear bumper, dent on left door, cracked mirror..." style="width:100%;min-height:120px;margin-top:10px;background:#111;color:#fff;border:1px solid var(--border);border-radius:10px;padding:10px;"></textarea>
        <div id="damageCount" class="muted" style="margin-top:6px;">0 characters</div>
        <button id="submitDamageBtn" class="btn-primary" style="width:100%;margin-top:10px;">Submit Claim</button>
        <button id="closeDamageBtn" class="btn-secondary" style="width:100%;margin-top:8px;">Close</button>
      `;
      wrap.classList.add('show');
      const note = document.getElementById('damageNote');
      note.oninput = () => { document.getElementById('damageCount').textContent = `${note.value.length} characters`; };
      document.getElementById('closeDamageBtn').onclick = () => wrap.classList.remove('show');
      document.getElementById('submitDamageBtn').onclick = async () => {
        const btn = document.getElementById('submitDamageBtn');
        const noteText = note.value.trim();
        if (noteText.length < 5) {
          showToast('Please add a short damage description before submitting.');
          return;
        }
        btn.disabled = true;
        btn.innerHTML = 'Analyzing with AI...';
        try {
          const bookingId = state.currentBooking?.bookingId || state.lastBookingId;
          if (!bookingId) {
            throw new Error('Missing booking reference. Please reopen active booking and try again.');
          }
          const report = await json(`${apiBase}/damage/claim`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              bookingId,
              driverNote: noteText,
              entryVideoURL: state.entryVideoURL,
              exitVideoURL: state.exitVideoURL
            })
          });
          content.innerHTML = `
            <h2 style="font-family:var(--font-head);">✨ AI Damage Analysis Report</h2>
            <div style="margin-top:8px;">Damage Detected: <span class="status-chip ${report.damageDetected ? 'status-red' : 'status-green'}">${report.damageDetected ? 'Yes' : 'No'}</span></div>
            <div style="margin-top:8px;">AI Confidence</div>
            <div class="progress"><span style="width:${report.confidenceScore || 0}%;"></span></div>
            <div class="chips" style="margin-top:8px;">${(report.suspectedDamageAreas || []).map((a) => `<span class='chip'>${a}</span>`).join('')}</div>
            <div style="margin-top:8px;">Severity: <span class="status-chip ${report.severity === 'severe' ? 'status-red' : report.severity === 'moderate' ? 'pill-danger' : report.severity === 'minor' ? 'status-amber' : ''}">${report.severity}</span></div>
            <div style="margin-top:8px;color:var(--gold);font-size:1.4rem;">₹${report.estimatedRepairCost || 0}</div>
            <div style="margin-top:8px;">Recommendation: <span class="status-chip ${report.recommendation === 'compensate' ? 'status-green' : report.recommendation === 'investigate' ? 'status-amber' : ''}">${report.recommendation}</span></div>
            <p class="muted" style="font-style:italic;margin-top:8px;">${report.aiRemarks || ''}</p>
            <button id="doneDamageBtn" class="btn-primary" style="width:100%;margin-top:8px;">Done</button>
          `;
          document.getElementById('doneDamageBtn').onclick = () => {
            state.awaitingDamagePrompt = false;
            wrap.classList.remove('show');
            showToast('Damage claim submitted. Owner has been notified.');
          };
        } catch (error) {
          btn.disabled = false;
          btn.textContent = 'Submit Claim';
          showToast(`Could not submit claim: ${error.message || 'unknown error'}`);
        }
      };
    }

    function initMap() {
      state.map = L.map('map', { fadeAnimation: false }).setView([state.userPos.lat, state.userPos.lng], 13, { animate: false });
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap' }).addTo(state.map);
      L.circleMarker([state.userPos.lat, state.userPos.lng], { radius: 7, color: '#00d4ff' }).addTo(state.map);
    }

    async function getSpotAvailabilityColor(spotId) {
      const now = Date.now();
      const data = await json(`${apiBase}/bookings?spotId=${spotId}`).catch(() => ({ bookings: [] }));
      const active = (data.bookings || []).find((b) => {
        const s = new Date(b.startTime).getTime();
        const e = new Date(b.endTime).getTime();
        return s <= now && now <= e && b.status !== 'completed' && b.status !== 'cancelled';
      });
      if (!active) return '#00d4ff';
      const endMs = new Date(active.endTime).getTime();
      if (endMs - now <= 30 * 60 * 1000) return '#ffaa00';
      return '#ff4444';
    }

    function markerIcon(color, rate) {
      return L.divIcon({
        className: '',
        html: `<div class="marker-wrap"><div class="marker-dot" style="background:${color};"></div><div class="price-pill">₹${rate}/hr</div></div>`,
        iconSize: [70, 42],
        iconAnchor: [35, 42]
      });
    }

    async function renderMarkers(spots) {
      state.markers.forEach((m) => state.map.removeLayer(m));
      state.markers = [];
      state.spotMarkerStatus = {};
      for (const spot of spots) {
        const color = await getSpotAvailabilityColor(spot.spotId);
        state.spotMarkerStatus[spot.spotId] = color;
        const marker = L.marker([Number(spot.latitude), Number(spot.longitude)], { icon: markerIcon(color, spot.baseHourlyRate || 0) }).addTo(state.map);
        marker.on('click', () => openSpotSheet(spot));
        state.markers.push(marker);
      }
    }

    function demandBadgeClass(level) {
      if (level === 'low') return 'status-green';
      if (level === 'medium') return 'status-amber';
      if (level === 'high') return 'pill-danger';
      if (level === 'very_high') return 'status-red';
      return 'status-amber';
    }

    function occupancyNearby() {
      const total = Object.keys(state.spotMarkerStatus).length;
      if (!total) return 0;
      const busy = Object.values(state.spotMarkerStatus).filter((c) => c === '#ff4444' || c === '#ffaa00').length;
      return busy / total;
    }

    async function fetchAiPriceForSpot(spot) {
      const now = new Date();
      const timeOfDay = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
      const dayOfWeek = now.toLocaleDateString('en-US', { weekday: 'long' });
      const hasUpcomingBooking = state.spotMarkerStatus[spot.spotId] === '#ffaa00';
      const body = {
        spotId: spot.spotId,
        baseRate: Number(spot.baseHourlyRate || 0),
        lat: Number(spot.latitude),
        lng: Number(spot.longitude),
        timeOfDay,
        dayOfWeek,
        occupancyNearby: occupancyNearby(),
        hasUpcomingBooking
      };
      return json(`${apiBase}/ai/pricing`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    }

    function renderAiPricingSection(ai, baseRate) {
      const aiSection = document.getElementById('ai-price-section');
      const base = Number(baseRate || 0);
      if (!aiSection) return;
      if (!ai) {
        aiSection.innerHTML = `<div class="muted sheet-ai-fallback"><span class="sheet-ai-rate-small">₹${base}</span>/hr · map rate</div>`;
        state.selectedRate = base;
        updateTotal();
        return;
      }
      state.selectedRate = Number(ai.finalPrice) || base;
      aiSection.innerHTML = `
        <div class="sheet-ai-row">
          <div class="sheet-ai-rate-block">
            <div class="sheet-ai-rate">₹${state.selectedRate}<span class="sheet-ai-unit">/hr</span></div>
            ${state.selectedRate !== base ? `<div class="muted sheet-ai-struck"><s>₹${base}/hr</s> base</div>` : ''}
          </div>
          <span class="status-chip ${demandBadgeClass(ai.demandLevel)}">${(ai.demandLevel || 'medium').replace('_', ' ').toUpperCase()}</span>
        </div>
        <p class="muted sheet-ai-reason">${ai.reasoning || 'AI pricing unavailable - showing base rate'}</p>
        <span class="sheet-ai-badge">✨ Dynamic pricing</span>
      `;
      updateTotal();
    }

    function openSpotSheet(spot) {
      state.selectedSpot = spot;
      state.selectedHours = 1;
      state.selectedRate = Number(spot.baseHourlyRate || 0);
      const distance = haversineDistance(state.userPos.lat, state.userPos.lng, Number(spot.latitude), Number(spot.longitude)).toFixed(1);
      const images = (spot.images || []).length ? spot.images : ['https://via.placeholder.com/320x180?text=No+Image'];
      const mainPhoto = images[0];
      const extraPhotos = images.slice(1);
      const features = [
        spot.isCovered ? '<span class="chip">Covered</span>' : '',
        spot.hasEVCharging ? '<span class="chip">EV</span>' : '',
        spot.hasCCTV ? '<span class="chip">CCTV</span>' : ''
      ].filter(Boolean).join('');
      const vehicleTags = (spot.vehicleTypes || []).map((v) => `<span class="chip">${v}</span>`).join('');
      const tagHtml = [features, vehicleTags].filter(Boolean).join('');
      const sheet = document.getElementById('sheet');
      sheet.innerHTML = `
        <div class="sheet-body">
          <div class="sheet-hero">
            <div class="sheet-hero-photo">
              <img src="${mainPhoto}" alt="" loading="lazy" class="sheet-hero-img" />
              ${extraPhotos.length ? `<div class="sheet-hero-extra">${extraPhotos.slice(0, 4).map((img) => `<img src="${img}" alt="" loading="lazy" />`).join('')}${extraPhotos.length > 4 ? `<span class="sheet-more-photos">+${extraPhotos.length - 4}</span>` : ''}</div>` : ''}
            </div>
            <div class="sheet-hero-copy">
              <h2 class="sheet-title">${spot.title || 'Parking Spot'}</h2>
              <p class="sheet-address muted">${spot.address || ''}</p>
              <div class="sheet-meta">
                <span class="sheet-pill">${distance} km</span>
                <span class="sheet-pill sheet-pill--time">${spot.availableFrom || '--:--'} – ${spot.availableTo || '--:--'}</span>
              </div>
            </div>
          </div>
          ${tagHtml ? `<div class="sheet-tags chips">${tagHtml}</div>` : ''}
          <div id="ai-price-section" class="card sheet-ai-card">
            <div class="skeleton sheet-sk"></div>
            <div class="skeleton sheet-sk sheet-sk-narrow"></div>
            <p class="muted sheet-ai-loading">Tuning price to demand…</p>
          </div>
          <div class="sheet-duration-block">
            <p class="sheet-section-label">Stay duration</p>
            <div class="duration">
              <button type="button" class="btn-secondary dur" data-h="1">1h</button>
              <button type="button" class="btn-secondary dur" data-h="2">2h</button>
              <button type="button" class="btn-secondary dur" data-h="3">3h</button>
              <button type="button" class="btn-secondary" id="customBtn">Custom</button>
            </div>
            <div id="customDurationWrap" class="sheet-custom-row" style="display:none;">
              <input id="customHours" class="sheet-input" type="number" min="0" value="0" />
              <span class="muted sheet-input-hint">h</span>
              <input id="customMinutes" class="sheet-input" type="number" min="0" max="59" value="30" />
              <span class="muted sheet-input-hint">m</span>
            </div>
          </div>
        </div>
        <footer class="sheet-footer">
          <p id="totalPrice" class="sheet-total"><span class="sheet-total-prefix">Total</span><span class="sheet-total-value">₹${(spot.baseHourlyRate || 0) * state.selectedHours}</span></p>
          <div class="sheet-actions">
            <button type="button" id="closeSheetBtn" class="btn-secondary sheet-btn-quiet">Dismiss</button>
            <button type="button" id="bookNowBtn" class="btn-primary sheet-btn-main">Reserve</button>
          </div>
        </footer>
      `;
      sheet.classList.add('open');
      sheet.querySelectorAll('.dur').forEach((btn) => btn.onclick = () => {
        state.selectedHours = Number(btn.dataset.h);
        updateTotal();
      });
      sheet.querySelector('#customBtn').onclick = () => {
        const wrap = sheet.querySelector('#customDurationWrap');
        wrap.style.display = wrap.style.display === 'none' ? 'flex' : 'none';
      };
      sheet.querySelector('#customHours').oninput = (e) => {
        const h = Math.max(0, Number(e.target.value || 0));
        const mInput = sheet.querySelector('#customMinutes');
        const m = Math.min(59, Math.max(0, Number(mInput.value || 0)));
        state.selectedHours = Math.max(1 / 60, h + m / 60);
        updateTotal();
      };
      sheet.querySelector('#customMinutes').oninput = (e) => {
        const m = Math.min(59, Math.max(0, Number(e.target.value || 0)));
        e.target.value = String(m);
        const hInput = sheet.querySelector('#customHours');
        const h = Math.max(0, Number(hInput.value || 0));
        state.selectedHours = Math.max(1 / 60, h + m / 60);
        updateTotal();
      };
      sheet.querySelector('#bookNowBtn').onclick = openBookingModal;
      sheet.querySelector('#closeSheetBtn').onclick = closeSheet;
      fetchAiPriceForSpot(spot).then((ai) => {
        renderAiPricingSection(ai, spot.baseHourlyRate || 0);
      }).catch(() => {
        renderAiPricingSection(null, spot.baseHourlyRate || 0);
      });
    }

    function updateTotal() {
      const total = (state.selectedRate || state.selectedSpot.baseHourlyRate || 0) * state.selectedHours;
      const el = document.getElementById('totalPrice');
      if (el) el.innerHTML = `<span class="sheet-total-prefix">Total</span><span class="sheet-total-value">₹${total}</span>`;
    }

    function closeSheet() { document.getElementById('sheet').classList.remove('open'); }

    function datetimeLocalPad(d) {
      return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 16);
    }

    function openBookingModal() {
      const spot = state.selectedSpot;
      const pricePerHour = Number(state.selectedRate || spot.baseHourlyRate || 0);
      const total = pricePerHour * state.selectedHours;
      const defaultStart = new Date();
      defaultStart.setSeconds(0, 0);
      if (defaultStart.getTime() < Date.now()) defaultStart.setMinutes(defaultStart.getMinutes() + 1);
      const localDefault = datetimeLocalPad(defaultStart);
      const twoHoursAgo = datetimeLocalPad(new Date(Date.now() - 2 * 60 * 60 * 1000));
      document.getElementById('bookingSummary').innerHTML = `
        <div><strong>${spot.title}</strong></div>
        <div>${spot.address}</div>
        <label class="label" for="bookingStartAt" style="display:block;margin-top:8px;">Start At</label>
        <input id="bookingStartAt" type="datetime-local" style="width:100%;background:#111;color:#fff;border:1px solid var(--border);border-radius:10px;padding:8px;" />
        <div>Duration: ${state.selectedHours}h</div>
        <div>Rate: ₹${pricePerHour}/hr</div>
        <div>Total: ₹${total}</div>
      `;
      const startInput = document.getElementById('bookingStartAt');
      startInput.value = state.selectedStartTime || localDefault;
      startInput.min = twoHoursAgo;
      document.getElementById('bookingError').textContent = '';
      document.getElementById('bookingModalWrap').classList.add('show');
    }

    document.getElementById('closeModalBtn').onclick = () => document.getElementById('bookingModalWrap').classList.remove('show');
    document.getElementById('confirmBookBtn').onclick = async () => {
      const btn = document.getElementById('confirmBookBtn');
      btn.disabled = true;
      btn.textContent = 'Processing...';
      try {
        const spot = state.selectedSpot;
        const startInput = document.getElementById('bookingStartAt');
        let start = new Date(startInput?.value || '');
        if (!startInput?.value || !Number.isFinite(start.getTime())) {
          document.getElementById('bookingError').textContent = 'Please choose a valid start date and time.';
          return;
        }
        if (start.getTime() < Date.now() - 2 * 60 * 60 * 1000) {
          document.getElementById('bookingError').textContent = 'Start time is too far in the past. Pick a newer time.';
          return;
        }
        if (start.getTime() < Date.now()) {
          start = new Date();
        }
        state.selectedStartTime = startInput.value;
        const end = new Date(start.getTime() + state.selectedHours * 60 * 60 * 1000);
        const body = {
          spotId: spot.spotId,
          spotTitle: spot.title,
          spotAddress: spot.address,
          driverId: uid,
          driverName: sessionStorage.getItem('name') || 'Driver',
          ownerId: spot.ownerId,
          startTime: start.toISOString(),
          endTime: end.toISOString(),
          durationHours: state.selectedHours,
          baseRate: Number(state.selectedRate || spot.baseHourlyRate || 0),
          aiSurgeMultiplier: 1.0,
          totalAmount: Number(state.selectedRate || spot.baseHourlyRate || 0) * state.selectedHours,
          paymentStatus: 'mock_paid'
        };
        const data = await json(`${apiBase}/bookings`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        state.currentBooking = data.booking;
        state.lastBookingId = data.booking.bookingId;
        state.entryVideoURL = data.booking.entryVideoURL || null;
        state.exitVideoURL = data.booking.exitVideoURL || null;
        document.getElementById('bookingModalWrap').classList.remove('show');
        closeSheet();
        showActiveBookingBar();
        openVideoModal('entry');
      } catch (error) {
        const msg = String(error?.message || '');
        if (msg.includes('already booked')) {
          let endHint = '';
          try {
            const parsed = JSON.parse(msg);
            if (parsed.conflictEndsAt) {
              endHint = ` Available after ${new Date(parsed.conflictEndsAt).toLocaleTimeString()}.`;
            }
          } catch {
            // keep default hint
          }
          document.getElementById('bookingError').textContent =
            `This spot is already booked for that time.${endHint} Please choose another spot or duration.`;
        } else {
          document.getElementById('bookingError').textContent = 'Something went wrong. Please try again.';
          showToast('Something went wrong. Please try again.', 'warning');
        }
      } finally {
        btn.disabled = false;
        btn.textContent = 'Confirm & Pay (Demo)';
      }
    };

    function parseBookingInstantMs(raw) {
      if (raw == null) return NaN;
      if (typeof raw === 'number' && Number.isFinite(raw)) return raw;
      if (typeof raw === 'string') return new Date(raw).getTime();
      if (typeof raw?.toDate === 'function') return raw.toDate().getTime();
      if (typeof raw === 'object') {
        if (typeof raw.seconds === 'number') return raw.seconds * 1000 + (raw.nanoseconds || 0) / 1e6;
        if (typeof raw._seconds === 'number') return raw._seconds * 1000 + (raw._nanoseconds || 0) / 1e6;
      }
      return new Date(raw).getTime();
    }

    function isBookingFutureReservation(booking, nowMs = Date.now()) {
      const startMs = parseBookingInstantMs(booking?.startTime);
      if (!Number.isFinite(startMs)) return false;
      return nowMs < startMs - 60 * 1000;
    }

    function getStatusMeta(booking) {
      const endMs = parseBookingInstantMs(booking?.endTime);
      if (!Number.isFinite(endMs)) return { text: 'Active', cls: 'status-green' };
      const remaining = endMs - Date.now();
      if (isBookingFutureReservation(booking)) return { text: 'Upcoming', cls: 'status-amber' };
      if (remaining <= 0) return { text: 'Overstaying', cls: 'status-red' };
      if (remaining < 15 * 60 * 1000) return { text: 'Ending Soon', cls: 'status-amber' };
      return { text: 'Active', cls: 'status-green' };
    }

    function openExtensionModal() {
      if (!state.currentBooking) return;
      const modal = document.getElementById('extensionModalWrap');
      const content = document.getElementById('extensionModalContent');
      let chosenHours = 1;
      const costPreview = () => Math.round((Number(state.currentBooking.baseRate || 0) * Number(state.currentBooking.aiSurgeMultiplier || 1) * chosenHours) || 0);

      const renderRequestUI = () => {
        content.innerHTML = `
          <h3>Extend Your Parking</h3>
          <div class="duration" style="margin-top:10px;">
            <button class="btn-secondary pill-option active" data-h="1">+1 Hour</button>
            <button class="btn-secondary pill-option" data-h="2">+2 Hours</button>
            <button class="btn-secondary pill-option" data-h="3">+3 Hours</button>
          </div>
          <p class="muted" id="extCost">This will cost approximately ₹${costPreview()}</p>
          <button id="requestExtBtn" class="btn-primary" style="width:100%;">Request Extension</button>
          <p id="extError" style="color:var(--danger);margin-top:8px;"></p>
        `;
        content.querySelectorAll('.pill-option').forEach((btn) => {
          btn.onclick = () => {
            chosenHours = Number(btn.dataset.h);
            content.querySelectorAll('.pill-option').forEach((el) => el.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('extCost').textContent = `This will cost approximately ₹${costPreview()}`;
          };
        });
        document.getElementById('requestExtBtn').onclick = () => requestExtension(chosenHours);
      };

      const requestExtension = async (hours) => {
        const btn = document.getElementById('requestExtBtn');
        btn.disabled = true;
        btn.textContent = 'Requesting...';
        try {
          const data = await json(`${apiBase}/extensions/request`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ bookingId: state.currentBooking.bookingId, extensionHours: hours })
          });
          if (data.approved) {
            modal.classList.remove('show');
            const updated = await json(`${apiBase}/bookings/${state.currentBooking.bookingId}`);
            state.currentBooking = updated.booking;
            const total = updated.booking?.totalAmount;
            showToast(
              `Extension approved. +₹${data.extensionCost}${total != null ? ` · Session total ₹${Number(total).toFixed(0)}` : ''}. Ends ${new Date(data.newEndTime).toLocaleString()}.`,
              'success'
            );
            document.getElementById('towBanner').classList.remove('show');
            showActiveBookingBar();
            return;
          }

          const conflict = data.conflictData;
          content.innerHTML = `<p class="muted">Checking availability with next driver...</p><div class="skeleton" style="height:14px;margin-top:8px;"></div>`;
          setTimeout(async () => {
            content.innerHTML = `
              <h3>Extension Request Under Review</h3>
              <p style="color:var(--gold);font-weight:700;">₹${conflict.compensationAmount} offered to the next driver</p>
              <p class="muted" style="font-style:italic;">${conflict.compensationReason}</p>
              <div class="card" style="margin:8px 0;">${conflict.alternateSpotRecommendation}</div>
              <span class="status-chip ${conflict.urgencyLevel === 'high' ? 'status-red' : conflict.urgencyLevel === 'medium' ? 'status-amber' : 'status-green'}">${conflict.urgencyLevel.toUpperCase()}</span>
              <p class="muted" style="margin-top:8px;">${conflict.resolutionStrategy}</p>
              <p id="conflictResult" class="muted" style="margin-top:10px;"></p>
            `;
            setTimeout(async () => {
              const outcome = Math.random() < 0.7 ? 'accepted' : 'rejected';
              await json(`${apiBase}/extensions/resolve`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ conflictId: conflict.conflictId, outcome })
              });
              const resultNode = document.getElementById('conflictResult');
              if (outcome === 'accepted') {
                resultNode.style.color = 'var(--success)';
                resultNode.textContent = 'Extension approved by next driver. Updated timer applied.';
                const updated = await json(`${apiBase}/bookings/${state.currentBooking.bookingId}`);
                state.currentBooking = updated.booking;
                showActiveBookingBar();
              } else {
                resultNode.style.color = 'var(--danger)';
                resultNode.textContent = 'Extension denied. Please vacate on time.';
              }
              setTimeout(() => modal.classList.remove('show'), 3000);
            }, 5000);
          }, 2000);
        } catch (error) {
          document.getElementById('extError').textContent = 'Could not process extension request.';
          btn.disabled = false;
          btn.textContent = 'Request Extension';
        }
      };

      renderRequestUI();
      modal.classList.add('show');
    }

    function showActiveBookingBar() {
      const bar = document.getElementById('activeBookingBar');
      if (!state.currentBooking) return;
      const b = state.currentBooking;
      const status = getStatusMeta(b);
      const startMs = parseBookingInstantMs(b.startTime);
      const endMs = parseBookingInstantMs(b.endTime);
      const nowMs = Date.now();
      const isUpcomingWindow = isBookingFutureReservation(b, nowMs);
      const isPastEnd = Number.isFinite(endMs) && nowMs > endMs;
      const inOverstayStatus = b.status === 'overstaying';
      const showGraceUi = inOverstayStatus && isPastEnd;
      const remainingSec = isUpcomingWindow ? Math.max(0, Math.floor((endMs - startMs) / 1000)) : Math.max(0, Math.floor((endMs - nowMs) / 1000));
      const h = Math.floor(remainingSec / 3600);
      const m = Math.floor((remainingSec % 3600) / 60);
      const s = remainingSec % 60;
      const overdueSeconds = Math.max(0, Math.floor((nowMs - endMs) / 1000));
      const graceRemaining = showGraceUi ? Math.max(0, 300 - overdueSeconds) : 0;
      const penalty = Math.round(Number(b.baseRate || 0) * 1.5);
      const sessionTotal = Number(b.totalAmount);
      const sessionTotalLine = Number.isFinite(sessionTotal) && sessionTotal > 0
        ? `<div class="muted">Session total (incl. extensions): ₹${sessionTotal.toFixed(0)}</div>`
        : '';
      bar.style.background = showGraceUi ? '#3b0000' : 'var(--surface)';
      const mainTimeLine = isUpcomingWindow
        ? `<div class="muted">Parking allowed after: ${new Date(startMs).toLocaleString()}</div>
           <div class="muted">Booked duration: ${h}h ${m}m ${s}s</div>`
        : showGraceUi
          ? `<div class="muted">Past your booked end — extend or end booking to avoid tow.</div>`
          : `<div class="muted">Time left: ${h}h ${m}m ${s}s</div>`;
      const chipLabel = showGraceUi ? '🚨 OVERSTAYING' : (isUpcomingWindow ? 'UPCOMING' : status.text);
      const chipClass = showGraceUi ? 'status-red' : (isUpcomingWindow ? 'status-amber' : status.cls);
      bar.innerHTML = `
        <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;">
          <div>
            <strong>${b.spotTitle || 'Spot'}</strong> • ${b.spotAddress || ''}
            ${mainTimeLine}
            ${sessionTotalLine}
            ${showGraceUi ? `<div style="color:#ff8f8f;">Penalty accruing: ₹${penalty}/hr</div><div style="color:#ffb3b3;">Grace before tow: ${Math.floor(graceRemaining / 60)}m ${graceRemaining % 60}s</div>` : ''}
          </div>
          <span class="status-chip ${chipClass}">${chipLabel}</span>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button id="extendBtn" class="btn-secondary">Extend ⏱</button>
          <button id="navigateBtn" class="btn-secondary">Navigate 🗺</button>
          <button id="endBtn" class="btn-danger">End Booking ✋</button>
        </div>
      `;
      bar.classList.add('show');
      document.getElementById('extendBtn').onclick = () => {
        openExtensionModal();
      };
      document.getElementById('navigateBtn').onclick = () => window.open(`https://www.google.com/maps/dir/?api=1&destination=${b.latitude || state.selectedSpot.latitude},${b.longitude || state.selectedSpot.longitude}`, '_blank');
      document.getElementById('endBtn').onclick = async () => {
        const nowMs = Date.now();
        const startForBilling = parseBookingInstantMs(b.startTime);
        const effectiveStart = Number.isFinite(startForBilling) ? Math.min(startForBilling, nowMs) : nowMs;
        const parkedHours = Math.max(0, (nowMs - effectiveStart) / (60 * 60 * 1000));
        const hourlyRate = Number(b.baseRate || 0) * Number(b.aiSurgeMultiplier || 1);
        const overstayHours = Math.max(0, (nowMs - parseBookingInstantMs(b.endTime)) / (60 * 60 * 1000));
        const overstayCharge = overstayHours * Number(b.baseRate || 0) * 1.5;
        const usageCharge = parkedHours * hourlyRate;
        const finalCharge = Math.max(0, Math.round((usageCharge + overstayCharge) * 100) / 100);
        await json(`${apiBase}/bookings/${b.bookingId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            status: 'completed',
            endTime: new Date(nowMs).toISOString(),
            durationHours: Math.round(parkedHours * 100) / 100,
            totalAmount: finalCharge,
            paymentStatus: 'mock_paid'
          })
        });
        bar.classList.remove('show');
        state.lastBookingId = b.bookingId;
        state.awaitingDamagePrompt = true;
        showToast(`Booking ended. Charged ₹${finalCharge.toFixed(2)}.`, 'success');
        openVideoModal('exit');
        state.currentBooking = null;
        setTimeout(() => {
          if (state.awaitingDamagePrompt && !document.getElementById('videoModalWrap').classList.contains('show') && !document.getElementById('damagePromptWrap').classList.contains('show')) {
            openDamagePrompt();
          }
        }, 1200);
        setTimeout(() => {
          if (state.awaitingDamagePrompt && !document.getElementById('damagePromptWrap').classList.contains('show')) {
            openDamagePrompt();
          }
        }, 9000);
      };
      if (showGraceUi && graceRemaining <= 0) {
        document.getElementById('towBanner').classList.add('show');
      } else {
        document.getElementById('towBanner').classList.remove('show');
      }
    }

    setInterval(async () => {
      if (!state.currentBooking) return;
      const result = await json(`${apiBase}/bookings/${state.currentBooking.bookingId}`).catch(() => null);
      if (!result || !result.booking) return;
      state.currentBooking = result.booking;
      if (state.currentBooking.status === 'completed' || state.currentBooking.status === 'cancelled') {
        document.getElementById('activeBookingBar').classList.remove('show');
        document.getElementById('towBanner').classList.remove('show');
        state.currentBooking = null;
        return;
      }
      showActiveBookingBar();
    }, 30000);

    setInterval(() => {
      if (!state.currentBooking) return;
      if (state.currentBooking.status === 'completed' || state.currentBooking.status === 'cancelled') {
        document.getElementById('activeBookingBar').classList.remove('show');
        return;
      }
      showActiveBookingBar();
    }, 1000);

    function statusChipClass(status) {
      if (status === 'active') return 'status-green';
      if (status === 'upcoming') return 'status-amber';
      if (status === 'cancelled') return 'status-red';
      if (status === 'overstaying') return 'status-amber';
      return '';
    }

    let lastDriverHistoryBookings = [];

    function mountHistoryControls(panel, bookings) {
      const hidden = getHiddenHistoryIds();
      const visible = bookings.filter((b) => {
        const k = bookingKey(b);
        return k && !hidden.has(k);
      });
      const listHtml = visible.length
        ? visible
            .map(
              (b) => `
          <article class="card history-pop-row">
            <div class="history-pop-spot"><strong>${b.spotTitle || 'Spot'}</strong></div>
            <div class="history-pop-meta">${new Date(b.startTime).toLocaleString()} · ${b.durationHours || 0}h</div>
            <div class="history-pop-total">₹${b.totalAmount || 0} <span class="status-chip ${statusChipClass(b.status)}">${b.status || ''}</span></div>
          </article>
        `
            )
            .join('')
        : bookings.length > 0
          ? `
          <div class="history-pop-empty-msg">History is hidden on this device.</div>
          <button type="button" id="restoreHistoryBtn" class="btn-secondary history-pop-restore">Show history again</button>
        `
          : `
          <div class="history-pop-empty-msg">No past bookings yet. Completed and cancelled trips appear here.</div>
        `;

      panel.innerHTML = `
        <div class="history-pop-inner">
          <div class="history-pop-head">
            <h3 class="history-pop-title">History</h3>
            <button type="button" id="closeHistory" class="btn-secondary history-pop-close" aria-label="Close">✕</button>
          </div>
          <div class="history-pop-scroll">${listHtml}</div>
          <div class="history-pop-actions">
            <button type="button" id="clearHistoryBtn" class="btn-secondary" ${visible.length === 0 ? 'disabled' : ''}>Clear history</button>
          </div>
        </div>
      `;

      document.getElementById('closeHistory').onclick = () => {
        panel.classList.remove('open');
        panel.innerHTML = '';
      };
      const clearBtn = document.getElementById('clearHistoryBtn');
      if (clearBtn && !clearBtn.disabled) {
        clearBtn.onclick = () => {
          const merged = getHiddenHistoryIds();
          visible.forEach((b) => {
            const k = bookingKey(b);
            if (k) merged.add(k);
          });
          saveHiddenHistoryIds(merged);
          showToast('History cleared on this device.');
          mountHistoryControls(panel, lastDriverHistoryBookings);
        };
      }
      const restoreBtn = document.getElementById('restoreHistoryBtn');
      if (restoreBtn) {
        restoreBtn.onclick = () => {
          localStorage.removeItem(DRIVER_HIDDEN_HISTORY_KEY);
          showToast('History restored.');
          mountHistoryControls(panel, lastDriverHistoryBookings);
        };
      }
    }

    document.getElementById('historyBtn').onclick = async (e) => {
      e.stopPropagation();
      const panel = document.getElementById('historyPanel');
      if (panel.classList.contains('open')) {
        panel.classList.remove('open');
        panel.innerHTML = '';
        return;
      }
      document.getElementById('notifDropdown').style.display = 'none';
      const data = await json(`${apiBase}/bookings?driverId=${uid}&status=completed,cancelled`).catch(() => ({ bookings: [] }));
      lastDriverHistoryBookings = [...(data.bookings || [])].sort(
        (a, b) => new Date(b.endTime || b.startTime).getTime() - new Date(a.endTime || a.startTime).getTime()
      );
      mountHistoryControls(panel, lastDriverHistoryBookings);
      panel.classList.add('open');
    };

    const suggestions = document.getElementById('suggestions');
    let searchTimer = null;
    document.getElementById('searchInput').addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      const q = e.target.value.trim();
      if (!q) {
        suggestions.style.display = 'none';
        return;
      }
      searchTimer = setTimeout(async () => {
        const list = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5`).then((r) => r.json()).catch(() => []);
        if (!list.length) {
          suggestions.style.display = 'none';
          return;
        }
        suggestions.innerHTML = list.map((item) => `<div class="suggestion" data-lat="${item.lat}" data-lng="${item.lon}">${item.display_name}</div>`).join('');
        suggestions.style.display = 'block';
        suggestions.querySelectorAll('.suggestion').forEach((entry) => entry.onclick = async () => {
          const lat = Number(entry.dataset.lat);
          const lng = Number(entry.dataset.lng);
          state.userPos = { lat, lng };
          state.map.setView([lat, lng], 15, { animate: false });
          suggestions.style.display = 'none';
          await loadNearbySpots();
        });
      }, 400);
    });

    async function loadNearbySpots() {
      const loadEl = document.getElementById('mapLoadingOverlay');
      loadEl.style.display = 'block';
      try {
        const data = await json(`${apiBase}/spots/nearby?lat=${state.userPos.lat}&lng=${state.userPos.lng}&radius=10`).catch(() => ({ spots: [] }));
        state.spots = data.spots || [];
        await renderMarkers(state.spots);
      } finally {
        loadEl.style.display = 'none';
      }
    }

    function initLocationAndData() {
      navigator.geolocation.getCurrentPosition(async (pos) => {
        state.userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        state.map.setView([state.userPos.lat, state.userPos.lng], 13, { animate: false });
        await loadNearbySpots();
      }, async () => {
        state.map.setView([18.9667, 72.8333], 13, { animate: false });
        await loadNearbySpots();
      });
    }

    initMap();
    verifySessionOnLoad();
    initLocationAndData();
    setupNotificationListener();
    json(`${apiBase}/bookings?driverId=${uid}&status=active,overstaying`).then((data) => {
      if ((data.bookings || []).length) {
        state.currentBooking = data.bookings[0];
        showActiveBookingBar();
      }
    }).catch(() => {});
    setInterval(loadNearbySpots, 60000);
  </script>
</body>
</html>
