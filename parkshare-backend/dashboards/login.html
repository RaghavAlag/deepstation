<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ParkShare Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #00d4ff;
      --gold: #f0c060;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.5);
      --danger: #ff4444;
      --success: #00ff88;
      --warning: #ffaa00;
      --font-head: 'Playfair Display', serif;
      --font-body: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      padding: 24px;
    }

    .card {
      width: min(460px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .logo {
      margin: 0;
      font-family: var(--font-head);
      font-size: 2.5rem;
      color: var(--accent);
      letter-spacing: 0.03em;
    }

    .tagline {
      margin: 8px 0 28px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .google-btn {
      width: 100%;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--text);
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      font-family: var(--font-body);
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 52px;
    }

    .google-btn:hover:not(:disabled) {
      background: rgba(0, 212, 255, 0.15);
      box-shadow: 0 0 25px rgba(0, 212, 255, 0.25);
    }

    .google-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-top-color: var(--text);
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error {
      margin-top: 14px;
      color: var(--danger);
      font-size: 0.92rem;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="logo">ParkShare</h1>
    <p class="tagline">Smart parking, trusted drivers, effortless earnings.</p>
    <button id="googleSignInBtn" class="google-btn" type="button">Continue with Google</button>
    <p id="errorMessage" class="error" role="alert"></p>
  </main>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
    import { getAuth, signInWithPopup, GoogleAuthProvider } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: 'PASTE_YOUR_FIREBASE_API_KEY_HERE', // Phase 1 Guide B step 12: apiKey
      authDomain: 'PASTE_YOUR_FIREBASE_AUTH_DOMAIN_HERE', // Phase 1 Guide B step 12: authDomain
      projectId: 'PASTE_YOUR_FIREBASE_PROJECT_ID_HERE', // Phase 1 Guide B step 12: projectId
      storageBucket: 'PASTE_YOUR_FIREBASE_STORAGE_BUCKET_HERE', // Phase 1 Guide B step 12: storageBucket
      messagingSenderId: 'PASTE_YOUR_FIREBASE_MESSAGING_SENDER_ID_HERE', // Phase 1 Guide B step 12: messagingSenderId
      appId: 'PASTE_YOUR_FIREBASE_APP_ID_HERE' // Phase 1 Guide B step 12: appId
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const button = document.getElementById('googleSignInBtn');
    const errorMessage = document.getElementById('errorMessage');
    const apiBase = 'http://localhost:3001/api';
    const defaultButtonText = 'Continue with Google';

    function setLoadingState(isLoading) {
      if (isLoading) {
        button.disabled = true;
        button.innerHTML = '<span class="spinner"></span> Signing you in...';
      } else {
        button.disabled = false;
        button.textContent = defaultButtonText;
      }
    }

    button.addEventListener('click', async () => {
      errorMessage.textContent = '';
      setLoadingState(true);

      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        const idToken = await user.getIdToken();

        const response = await fetch(`${apiBase}/auth/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idToken })
        });

        if (!response.ok) {
          throw new Error('Authentication failed on the server.');
        }

        const payload = await response.json();
        const profile = payload.user;

        sessionStorage.setItem('uid', profile.uid || '');
        sessionStorage.setItem('name', profile.name || '');
        sessionStorage.setItem('photoURL', profile.photoURL || '');
        sessionStorage.setItem('role', profile.role || '');

        if (!profile.role) {
          window.location.href = './role-select.html';
        } else if (profile.role === 'driver') {
          window.location.href = './driver.html';
        } else {
          window.location.href = './owner.html';
        }
      } catch (error) {
        errorMessage.textContent = 'Sign-in failed. Please try again and make sure popup blocking is off.';
        setLoadingState(false);
      }
    });
  </script>
</body>
</html>
